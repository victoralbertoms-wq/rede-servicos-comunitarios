version: '3.9'

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - ./web/.env
    restart: unless-stopped

  firebase-emulator:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./firebase:/app
    ports:
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
      - "9199:9199"   # Storage
      - "4000:4000"   # Emulator UI
    command: >
      sh -c "npm install -g firebase-tools &&
             firebase emulators:start --only auth,firestore,storage
             --project demo-rede-servicos"
    restart: unless-stopped
